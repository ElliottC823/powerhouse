<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ElliottC823/powerhouse/main/POWERHOUSE-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerhouse</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0d0e12; }
        #loader { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #0066FF; font-family: sans-serif; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="loader">LOADING POWERHOUSE...</div>
    <div id="content"></div>

    <script>
        async function loadPowerhouse() {
            try {
                // Fetching the raw index.html from your main repository
                const response = await fetch('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/index.html');
                const html = await response.text();
                
                // Replace the current document content with the fetched code
                document.open();
                document.write(html);
                document.close();
            } catch (error) {
                document.getElementById('loader').innerText = "Failed to load Powerhouse. Please check your connection.";
                console.error(error);
            }
        }
        loadPowerhouse();
    </script>
</body>
</html>
