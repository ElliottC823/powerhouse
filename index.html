<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerhouse</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ElliottC823/powerhouse/main/POWERHOUSE-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-default: #0066FF;
            --accent: #0066FF; 
            --bg: #0d0e12;
            --bg-image: url('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/background-dark.svg');
            /* Topbar Assets */
            --header-bg: url('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/topbar-dark.svg');
            --surface: #16181d;
            --text: #f0f2f5;
            --border: #2a2d35;
            --radius: 12px;
            --shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --bg-image: url('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/background-light.svg');
            --header-bg: url('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/topbar-light.svg');
            --surface: #ffffff;
            --text: #0a0a0a;
            --border: #d1d9e6;
            --shadow: 4px 4px 0px rgba(0, 0, 0, 0.05);
        }

        [data-corners="sharp"] { --radius: 0px !important; }

        /* Banner Styles */
        #message-banner {
            width: 100%;
            padding: 10px 20px;
            text-align: center;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            position: relative;
            z-index: 2005;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .banner-hidden { display: none !important; }
        #banner-text { text-shadow: 0px 1px 2px rgba(0,0,0,0.2); }

        * { box-sizing: border-box; transition: background 0.3s ease, color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: var(--bg-image);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        header {
            background-image: var(--header-bg);
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--accent);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .logo-img { height: 42px; width: auto; transition: filter 0.3s ease; }
        .logo-img:hover { filter: drop-shadow(0 0 8px var(--accent)); }

        .controls { display: flex; gap: 12px; align-items: center; }

        input[type="text"], select {
            background: var(--bg);
            border: 2px solid var(--border);
            padding: 10px 16px;
            font-family: inherit;
            font-weight: 700;
            color: var(--text);
            border-radius: var(--radius);
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        .settings-btn { 
            background: var(--accent); 
            color: white; border: none; 
            width: 42px; height: 42px; 
            border-radius: var(--radius);
            cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease;
        }
        .settings-btn:hover { transform: rotate(45deg); }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px auto;
            flex-wrap: wrap;
            padding: 0 20px;
            animation: fadeInUp 0.5s ease backwards;
        }

        .filter-btn {
            background: var(--surface);
            border: 2px solid var(--border);
            padding: 8px 18px;
            border-radius: var(--radius);
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            color: var(--text);
        }

        .filter-btn:hover { border-color: var(--accent); transform: translateY(-2px); }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto 40px auto;
            padding: 0 25px;
        }

        #game-grid.list-view {
            display: flex;
            flex-direction: column;
            max-width: 900px;
        }

        .game-card {
            background-color: var(--surface);
            background-image: var(--header-bg);
            background-size: cover;
            background-position: center;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            animation: scaleIn 0.4s ease backwards;
        }

        .list-view .game-card {
            flex-direction: row;
            height: 140px;
            margin-bottom: 15px;
        }

        .game-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.1);
            border-color: var(--accent);
        }

        .thumb-wrap {
            width: 100%; height: 200px;
            overflow: hidden; border-bottom: 2px solid var(--border);
            background: #000; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }

        .list-view .thumb-wrap {
            width: 240px; height: 100%;
            border-bottom: none; border-right: 2px solid var(--border);
        }

        .thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: transform 0.5s ease, opacity 0.3s ease; }
        .game-card:hover .thumb { transform: scale(1.05); opacity: 1; }
        
        .game-info { 
            padding: 20px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start;
            background: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] .game-info { background: rgba(0,0,0,0.3); }
        
        .game-header { display: flex; align-items: center; gap: 8px; margin: 8px 0 4px 0; }
        .game-title { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }
        
        .verified-badge {
            width: 18px;
            height: 18px;
            cursor: help;
            transition: transform 0.2s ease;
        }
        .verified-badge:hover { transform: scale(1.2); }

        .game-desc { 
            font-size: 0.85rem; 
            font-weight: 400; 
            opacity: 0.7; 
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tag {
            font-size: 0.65rem;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .settings-menu {
            display: block; 
            visibility: hidden;
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            position: fixed; 
            right: 2rem; 
            top: 80px;
            background: var(--surface); border: 3px solid var(--accent);
            padding: 20px; border-radius: var(--radius); z-index: 1001;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            min-width: 280px;
            max-height: 85vh; 
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .settings-menu.show { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }

        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 20px; font-weight: 700; }
        
        .version-row {
            margin-top: 20px; padding-top: 10px; border-top: 1px solid var(--border);
            font-size: 0.65rem; font-weight: 900; opacity: 0.5; text-align: right;
        }

        #tutorial-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .tutorial-box {
            background: var(--surface);
            color: var(--text);
            padding: 30px;
            border-radius: var(--radius);
            border: 4px solid var(--accent);
            max-width: 400px; width: 90%;
            text-align: center;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3);
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .highlight-element {
            position: relative;
            z-index: 2001 !important;
            box-shadow: 0 0 0 10000px rgba(0,0,0,0.7), 0 0 20px var(--accent) !important;
            pointer-events: none;
        }
    </style>
</head>
<body data-theme="dark">

<div id="message-banner" class="banner-hidden">
    <span id="banner-text">Welcome to Powerhouse!</span>
</div>

<div id="tutorial-overlay">
    <div class="tutorial-box">
        <h2 id="t-title">Welcome!</h2>
        <p id="t-text">Welcome to Powerhouse. Let's show you around.</p>
        <div class="tutorial-controls">
            <button class="t-btn t-back" id="t-back-btn" onclick="prevStep()" style="display:none;">Back</button>
            <button class="t-btn t-skip" onclick="endTutorial()">Skip</button>
            <button class="t-btn t-next" id="t-next-btn" onclick="nextStep()">Next</button>
        </div>
    </div>
</div>

<header id="header-guide">
    <img id="mainLogo" src="https://raw.githubusercontent.com/ElliottC823/powerhouse/main/POWERHOUSE-dark.png" alt="Powerhouse" class="logo-img">
    <div class="controls" id="controls-guide">
        <input type="text" id="searchInput" placeholder="SEARCH GAMES..." oninput="renderGames()">
        <select id="viewSelect" onchange="renderGames()">
            <option value="grid">GRID</option>
            <option value="list">LIST</option>
        </select>
        <button class="settings-btn" id="settings-guide" onclick="toggleSettings()">⚙</button>
    </div>
</header>

<div id="settingsMenu" class="settings-menu">
    <div class="row"><span>DARK MODE</span><input type="checkbox" id="themeToggle" checked onclick="updateUI()"></div>
    <div class="row"><span>DETAILED LOGO</span><input type="checkbox" id="logoToggle" onclick="updateUI()"></div>
    <div class="row"><span>ROUNDED UI</span><input type="checkbox" id="cornerToggle" checked onclick="updateUI()"></div>
    <div class="row">
        <span>ACCENT COLOR</span>
        <div class="color-controls">
            <input type="color" id="accentPicker" class="color-picker" value="#0066FF" oninput="updateUI()">
            <button class="reset-btn" onclick="resetAccent()">RESET</button>
        </div>
    </div>
    
    <div class="about-section">
        <h4>About Powerhouse</h4>
        <p id="aboutText">Loading hub information...</p> </div>

    <div class="links-section" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);">
        <h4 style="margin: 0 0 10px 0; font-size: 0.9rem;">Mirrors</h4>
        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem;">
            <a href="https://powerhouse.elliottc1120.workers.dev/" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 700;">Cloudflare</a>
            <a href="https://sites.google.com/view/powerhousehub/" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 700;">Google Sites</a>
            <a href="https://powerhousehub.netlify.app/" target="_blank" style="color: #ff4444; text-decoration: none; font-weight: 700;">Netlify (Broken)</a>
        </div>
    </div>

    <div class="version-row">V1.4.33</div> </div>

<nav class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('ALL')">ALL</button>
</nav>

<main id="game-grid"></main>

<script>
    let games = [];
    let currentFilter = 'ALL';
    let tutorialStep = 0;

    const tutorialContent = [
        { title: "Welcome!", text: "Welcome to Powerhouse, your ultimate game hub. Let's quickly show you the features!", target: null },
        { title: "Search & View", text: "Use this area to search for specific games or switch between Grid and List views.", target: "controls-guide" },
        { title: "Filters", text: "Filter games by category or Unblocked status to find exactly what you're looking for.", target: "filterBar" },
        { title: "Customization", text: "Click the gear icon to access Dark Mode, custom accent colors, and more!", target: "settings-guide" },
        { title: "Ready to Play?", text: "That's it! Enjoy the collection. Click any card to launch a game.", target: null }
    ];

    // Banner Functions
    function setBanner(text, bgColor = "#0066FF", textColor = "#ffffff") {
        const banner = document.getElementById('message-banner');
        const bText = document.getElementById('banner-text');
        bText.innerText = text;
        banner.style.backgroundColor = bgColor;
        banner.style.color = textColor;
    }

    function showBanner() { document.getElementById('message-banner').classList.remove('banner-hidden'); }
    function hideBanner() { document.getElementById('message-banner').classList.add('banner-hidden'); }

// This sets the message and color, then shows it
setBanner("Powerhouse, courtesy of C823, Grandpa Joey, Stein, and KC.", "#0066FF");
showBanner();

    // Consolidated data fetching for games and about text
    async function fetchData() {
        try {
            // Fetch Games
            const gamesResponse = await fetch('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/games.txt');
            if (!gamesResponse.ok) throw new Error('Could not find games.txt');
            games = await gamesResponse.json();
            
            // Fetch About Text
            const aboutResponse = await fetch('https://raw.githubusercontent.com/ElliottC823/powerhouse/main/about.txt');
            if (aboutResponse.ok) {
                const aboutContent = await aboutResponse.text();
                document.getElementById('aboutText').innerText = aboutContent;
            } else {
                document.getElementById('aboutText').innerText = "Powerhouse is a custom-built game hub full of unblocked games, and websites to annoy teachers.";
            }

            renderFilters();
            renderGames();
        } catch (error) {
            console.error("Error loading data:", error);
            document.getElementById('game-grid').innerHTML = `<p style="text-align:center; padding: 50px;">Failed to load hub data. Check console for details.</p>`;
        }
    }

    function toggleSettings() { document.getElementById('settingsMenu').classList.toggle('show'); }

    function resetAccent() {
        document.getElementById('accentPicker').value = '#0066FF';
        updateUI(); 
    }

    function setFilter(cat) {
        currentFilter = cat;
        renderFilters();
        renderGames();
    }

    function renderFilters() {
        const bar = document.getElementById('filterBar');
        const cats = ['ALL', 'UNBLOCKED', ...new Set(games.map(g => g.category.toUpperCase()))];
        bar.innerHTML = cats.map(c => `
            <button class="filter-btn ${currentFilter === c ? 'active' : ''}" 
                    onclick="setFilter('${c}')">${c}</button>
        `).join('');
    }

    function updateUI() {
        const isDark = document.getElementById('themeToggle').checked;
        const isDetailed = document.getElementById('logoToggle').checked;
        const isRounded = document.getElementById('cornerToggle').checked;
        const accentColor = document.getElementById('accentPicker').value;
        const logo = document.getElementById('mainLogo');

        localStorage.setItem('power_theme', isDark ? 'dark' : 'light');
        localStorage.setItem('power_logo_detailed', isDetailed);
        localStorage.setItem('power_corners', isRounded ? 'rounded' : 'sharp');
        localStorage.setItem('power_accent', accentColor);

        document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.documentElement.style.setProperty('--accent', accentColor);

        if (isDetailed) {
            logo.src = "https://raw.githubusercontent.com/ElliottC823/powerhouse/main/POWERHOUSE-4-22-2026.png";
        } else {
            logo.src = isDark 
                ? "https://raw.githubusercontent.com/ElliottC823/powerhouse/main/POWERHOUSE-dark.png"
                : "https://raw.githubusercontent.com/ElliottC823/powerhouse/main/POWERHOUSE-light.png";
        }
        document.body.setAttribute('data-corners', isRounded ? 'rounded' : 'sharp');
    }

    function trackPlay(gameTitle) {
        let playStats = JSON.parse(localStorage.getItem('power_play_stats') || '{}');
        playStats[gameTitle] = (playStats[gameTitle] || 0) + 1;
        localStorage.setItem('power_play_stats', JSON.stringify(playStats));
        setTimeout(renderGames, 500);
    }

    function renderGames() {
        const grid = document.getElementById('game-grid');
        const view = document.getElementById('viewSelect').value;
        const search = document.getElementById('searchInput').value.toLowerCase();

        if (view === 'list') { grid.classList.add('list-view'); } 
        else { grid.classList.remove('list-view'); }

        const playStats = JSON.parse(localStorage.getItem('power_play_stats') || '{}');

        let filtered = games.filter(g => {
            const matchesSearch = g.title.toLowerCase().includes(search) || g.desc.toLowerCase().includes(search);
            
            let matchesFilter = false;
            if (currentFilter === 'ALL') {
                matchesFilter = true;
            } else if (currentFilter === 'UNBLOCKED') {
                matchesFilter = g.verified === true;
            } else {
                matchesFilter = g.category.toUpperCase() === currentFilter;
            }
            
            return matchesSearch && matchesFilter;
        });

        filtered.sort((a, b) => {
            const playsA = playStats[a.title] || 0;
            const playsB = playStats[b.title] || 0;
            return playsB - playsA;
        });

        grid.innerHTML = filtered.map((game, i) => `
            <a href="${game.link}" target="_blank" class="game-card" 
               style="animation-delay: ${i * 0.05}s"
               onclick="trackPlay('${game.title.replace(/'/g, "\\'")}')">
                <div class="thumb-wrap"><img src="${game.thumb}" class="thumb" alt="${game.title}"></div>
                <div class="game-info">
                    <div>
                        <span class="tag">${game.category}</span>
                        ${playStats[game.title] ? `<span style="font-size:0.6rem; opacity:0.5; font-weight:900; margin-left:8px;">${playStats[game.title]} PLAYS</span>` : ''}
                    </div>
                    <div class="game-header">
                        <div class="game-title">${game.title}</div>
                        ${game.verified ? `<img src="https://raw.githubusercontent.com/ElliottC823/powerhouse/main/verified.svg" class="verified-badge" title="This website has been verified as unblocked">` : ''}
                    </div>
                    <div class="game-desc">${game.desc}</div>
                </div>
            </a>
        `).join('');
    }

    function startTutorial() {
        if (localStorage.getItem('tutorial_completed')) return;
        document.getElementById('tutorial-overlay').style.display = 'flex';
        updateTutorialStep();
    }

    function nextStep() {
        tutorialStep++;
        if (tutorialStep >= tutorialContent.length) {
            endTutorial();
        } else {
            updateTutorialStep();
        }
    }

    function prevStep() {
        if (tutorialStep > 0) {
            tutorialStep--;
            updateTutorialStep();
        }
    }

    function updateTutorialStep() {
        const step = tutorialContent[tutorialStep];
        document.getElementById('t-title').innerText = step.title;
        document.getElementById('t-text').innerText = step.text;
        
        document.getElementById('t-back-btn').style.display = (tutorialStep === 0) ? 'none' : 'inline-block';
        document.getElementById('t-next-btn').innerText = (tutorialStep === tutorialContent.length - 1) ? "Finish" : "Next";

        document.querySelectorAll('.highlight-element').forEach(el => el.classList.remove('highlight-element'));

        if (step.target) {
            document.getElementById(step.target).classList.add('highlight-element');
        }
    }

    function endTutorial() {
        document.getElementById('tutorial-overlay').style.display = 'none';
        document.querySelectorAll('.highlight-element').forEach(el => el.classList.remove('highlight-element'));
        localStorage.setItem('tutorial_completed', 'true');
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('power_theme');
        const t = savedTheme ? savedTheme === 'dark' : true; 
        
        const d = localStorage.getItem('power_logo_detailed') === 'true';
        const c = localStorage.getItem('power_corners') !== 'sharp';
        const a = localStorage.getItem('power_accent') || '#0066FF';

        document.getElementById('themeToggle').checked = t;
        document.getElementById('logoToggle').checked = d;
        document.getElementById('cornerToggle').checked = c;
        document.getElementById('accentPicker').value = a;

        updateUI();
        fetchData();
        setTimeout(startTutorial, 500);
    };

    window.onclick = (e) => {
        if (!e.target.closest('.settings-btn') && !e.target.closest('.settings-menu')) {
            document.getElementById('settingsMenu').classList.remove('show');
        }
    }
</script>
</body>
</html>
